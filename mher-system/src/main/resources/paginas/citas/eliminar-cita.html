<!DOCTYPE html>
<html   xmlns:th="http://www.thymeleaf.org"
        lang="es">
<head th:replace="~{plantillas/plantilla :: head}"></head>
<body>
<header th:replace="~{plantillas/plantilla :: header}"></header>
<main class="container text-center shadow-lg p-3 mb-5 bg-body-tertiary rounded">
    <h1 th:text="${contenido}"></h1>

    <form
          id="citaForm"
          th:action="@{/citas/eliminar-cita/paciente/{pacienteId}/cita/{citaId}(pacienteId=${citaRequest.paciente.pacienteId}, citaId=${citaRequest.citaId})}" th:object="${citaRequest}"
          method="post">
        <input type="hidden" name="pacienteId" th:value="${pacienteId}" />
        <input type="hidden"  name="citaId" th:value="${citaRequest.citaId}">
        <input type="hidden" id="especialidadChanged" name="especialidadChanged" value="false">

        <div class="row">
            <div class="col-md-5">
                <div class="form-group">
                    <label for="nombre" style="color: black;">Nombre Paciente</label>
                    <input type="text" disabled class="form-control" id="nombre" name="nombre"
                           placeholder="Nombre Paciente"
                           th:field="*{paciente.nombre}">
                </div>
            </div>
            <div class="col-md-5">
                <div class="form-group">
                    <label for="apellido" style="color: black;">Apellido Paciente</label>
                    <input type="text" disabled class="form-control" id="apellido" name="apellido"
                           placeholder="Apellido Paciente"
                           th:field="*{paciente.apellidos}">
                </div>
            </div>
            <div class="col-md-5">
                <div class="form-group">
                    <label for="fechaNacimiento" style="color: black;">Fecha nacimiento</label>
                    <input type="date" disabled class="form-control" id="fechaNacimiento" name="fechaNacimiento"
                           placeholder="Fecha nacimiento"
                           th:field="*{paciente.fechaDeNacimiento}">
                </div>
            </div>
            <div class="col-md-5">
                <div class="form-group">
                    <label for="genero" style="color: black;">Genero</label>
                    <select class="form-control" disabled th:field="*{paciente.genero}" id="genero" name="genero" required>
                        <option value="M">M</option>
                        <option value="F">F</option>
                    </select>
                </div>
            </div>
            <div class="col-md-5">
                <div class="form-group">
                    <label for="numeroDeSeguridad" style="color: black;">Número de Seguridad</label>
                    <input type="text" disabled class="form-control" id="numeroDeSeguridad" name="numeroDeSeguridad"
                           placeholder="Numero de Seguridad" required="required"
                           th:field="*{paciente.numeroDeSeguridad}">
                </div>
            </div>

            <!--                -->
            <div class="col-md-5">
                <div class="form-group">
                    <label for="fecha" style="color: black;">Fecha cita</label>
                    <input type="datetime-local" disabled class="form-control" id="fecha" name="fecha"
                           placeholder="Fecha consulta"
                           th:field="*{citaInicio}">
                </div>
            </div>
            <div class="col-md-5">
                <div class="form-group">
                    <label for="addMinutes"  style="color: black;">Duración</label>

                    <select class="form-control" disabled
                            th:field="*{addMinutes}"
                            id="addMinutes" name="addMinutes">
                        <option value="15">15</option>
                        <option value="30">30</option>
                        <option value="60">60</option>
                    </select>
                </div>
            </div>
            <div class="col-md-5">
                <div class="form-group">
                    <label for="doctor" style="color: black;">Doctor</label>
                    <input type="text" disabled class="form-control" id="doctor" name="doctor"
                           th:field="*{doctor.nombreCompleto}">
                </div>
            </div>
            <div class="col-md-5">
                <div class="form-group">
                    <label for="especialidad" style="color: black;">Especialidad</label>
                    <input type="text" disabled class="form-control" id="especialidad" name="especialidad"
                           th:field="*{especialidad.nombreEspecialidad}">
                </div>
            </div>

        </div>
        <div class="col-md-3">
            <br/>
            <button type="submit" class="btn btn-primary">Eliminar</button>
            <a th:href="@{/pacientes/detalle-paciente/{pacienteId}(pacienteId=${citaRequest.paciente.pacienteId})}"
               class="btn btn-info">Regresar</a>
        </div>
    </form>


</main>
<footer th:replace="~{plantillas/plantilla::footer}"></footer>
</body>
</html>
