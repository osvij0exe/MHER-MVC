<!DOCTYPE html>
<html   xmlns:th="http://www.thymeleaf.org"
        lang="es">
<head th:replace="~{plantillas/plantilla :: head}"></head>
<body>
<header th:replace="~{plantillas/plantilla :: header}"></header>
<main class="container text-center shadow-lg p-3 mb-5 bg-body-tertiary rounded">
    <h1 th:text="${contenido}">Crear Cuenta</h1>
    <section class="mt-4">
        <div class="container-fluid h-custom">
            <div class="row d-flex justify-content-center align-items-center h-100">
                <div class="col-md-9 col-lg-6 col-xl-5">
                    <img th:src="@{/image/medicina.jpg}" height="500" width="500" style="border-radius:10%"
                         class="img-fluid" alt="Registro médico">
                </div>
                <div class="col-md-8 col-lg-6 col-xl-4 offset-xl-1">

                    <form method="post"
                          role="form"
                          th:action="@{/security/process_register}"
                          th:object="${user}">

                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <div class="form-outline mb-4">
                            <h3>Registro de Usuario</h3>
                        </div>

                        <!-- Campo Nombre -->
                        <div class="form-outline mb-4 text-start">
                            <label class="form-label" for="nombre">Nombre</label>
                            <input type="text" id="nombre" th:field="*{doctor.nombre}"
                                   class="form-control form-control-lg" placeholder="Nombre" />
                            <p th:if="${#fields.hasErrors('doctor.nombre')}" th:errors="*{doctor.nombre}" class="text-danger small"></p>
                        </div>
                        <div class="form-outline mb-4 text-start">
                            <label class="form-label" for="apellido">Apellidos</label>
                            <input type="text" id="apellido" th:field="*{doctor.apellido}"
                                   class="form-control form-control-lg" placeholder="Appellidos" />
                            <p th:if="${#fields.hasErrors('doctor.apellido')}" th:errors="*{doctor.apellido}" class="text-danger small"></p>
                        </div>

                            <div class="form-outline mb-4 text-start">
                                <label for="genero" style="color: black;">Genero</label>
                                <select class="form-control"
                                        th:field="*{doctor.genero}"
                                        id="genero" name="genero"
                                        th:classappend="${#fields.hasErrors('doctor.genero')} ? ' is-invalid'">
                                    <option value="M">M</option>
                                    <option value="F">F</option>
                                </select>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('doctor.genero')}"
                                     th:errors="*{doctor.genero}">
                                </div>
                            </div>
                        <div class="form-outline mb-4 text-start">
                            <label class="form-label" for="cedulaProfesional">Cedula Profesional</label>
                            <input type="text" id="cedulaProfesional" th:field="*{doctor.cedulaProfesional}"
                                   class="form-control form-control-lg" placeholder="cedulaProfesional" />
                            <p th:if="${#fields.hasErrors('doctor.cedulaProfesional')}" th:errors="*{doctor.cedulaProfesional}" class="text-danger small"></p>
                        </div>

                        <div class="form-outline mb-4 text-start">
                            <select class="form-select form-select-lg mt-3"
                                    th:field="*{doctor.especialidadId}">

                                <option value="">Seleccione especialidad</option>

                                <option th:each="esp : ${especialidades}"
                                        th:value="${esp.especialidadId}"
                                        th:text="${esp.nombreEspecialidad}">
                                </option>

                            </select>
                        </div>


                        <!-- Campo Email -->
                        <div class="form-outline mb-4 text-start">
                            <label class="form-label" for="useEmail">Correo Electrónico</label>
                            <input type="email" id="useEmail" th:field="*{user.useEmail}"
                                   class="form-control form-control-lg" placeholder="usuario@dominio.com" />
                            <p th:if="${#fields.hasErrors('user.useEmail')}" th:errors="*{user.useEmail}" class="text-danger small"></p>
                        </div>

                        <!-- Campo Password -->
                        <div class="form-outline mb-3 text-start">
                            <label class="form-label" for="usePasswd">Contraseña</label>
                            <input type="password" id="usePasswd" th:field="*{user.usePasswd}"
                                   class="form-control form-control-lg" placeholder="password" />
                            <p th:if="${#fields.hasErrors('user.usePasswd')}" th:errors="*{user.usePasswd}" class="text-danger small"></p>
                        </div>

                        <div class="form-outline mb-3">
                            <button type="submit" class="btn btn-primary btn-lg w-100">Registrarse</button>
                        </div>


                    </form>
                </div>
            </div>
        </div>
    </section>
</main>
<footer th:replace="~{plantillas/plantilla::footer}"></footer>
</body>
</html>
